version: '3.8'

services:
  app:
    build: .
    image: bina-and-edarah:local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres_db:5432/bina_db?schema=public&connection_limit=10&pool_timeout=15
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - app_data:/data
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bina_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bina_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  app_data:
  postgres_data:
